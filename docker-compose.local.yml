services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: "INFO"
      ENVIRONMENT: "dev"
      SERVICE_NAME: "my-observability-service"
      OTEL_ENABLED: "false"
      ENABLE_TRAFFIC_GENERATOR: "false"
      DB_SPANS_ENABLED: "true"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "orders"
      DB_USER: "app"
      DB_PASSWORD: "app"
    depends_on:
      postgres:
        condition: service_healthy
