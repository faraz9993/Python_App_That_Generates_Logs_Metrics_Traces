apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-observability-service
  labels:
    app: my-observability-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-observability-service
  template:
    metadata:
      labels:
        app: my-observability-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: fansari9993/faraz_test_repo:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: my-observability-service-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
